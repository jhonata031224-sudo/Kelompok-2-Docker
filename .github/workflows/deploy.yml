name: Deploy ke VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Inject Commit Hash
        run: |
          sed -i "s/{{GIT_COMMIT_HASH}}/${{ github.sha }}/g" index.html

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 103.143.12.147
          username: root
          password: ${{ secrets.SSH_PASSWORD }} # <--- GANTI 'key' MENJADI 'password'
          source: "."
          target: "/app/jasukemazd"   
          exclude: .git # <--- GANTI TARGET KE FOLDER JASUKE
          rm: false
